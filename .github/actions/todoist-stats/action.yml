name: 'Todoist Stats'
description: 'Update README with Todoist statistics using REST API v2'
author: 'Custom Action'

inputs:
  todoist_api_key:
    description: 'Todoist API Token'
    required: true
  github_token:
    description: 'GitHub Token'
    required: true
    default: ${{ github.token }}

runs:
  using: 'node20'
  main: 'index.js'

branding:
  icon: 'check-square'
  color: 'red'
