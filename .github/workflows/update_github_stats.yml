name: GitHub Readme Stats

on:
  schedule:
    - cron: '0 14 * * *'  # Tokyo time 23:00
  workflow_dispatch:  # Manual trigger

jobs:
  update-stats:
    name: Update GitHub Stats
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Generate Stats Card
        uses: stats-organization/github-readme-stats-action@v1
        with:
          card: stats
          options: username=chinshunyu&show_icons=true&theme=gotham
          path: github-stats.svg
      
      - name: Commit changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add -A
          git diff --staged --quiet || git commit -m "📊 Update GitHub stats"
          git push
